#:schema https://developers.openai.com/codex/config-schema.json

###############################################################################
# Codex CLI configuration
# Exhaustive, grouped, and updated against the current Codex docs/reference.
###############################################################################

# ---------------------------------------------------------------------------
# Core model selection
# Root keys must appear before TOML tables.
# ---------------------------------------------------------------------------

model = "gpt-5.5"                     # Primary model Codex uses for normal sessions.
model_reasoning_effort = "high"       # Default reasoning depth: none | minimal | low | medium | high | xhigh.
personality = "pragmatic"             # Communication style for supported models: none | friendly | pragmatic.
approval_policy = "on-request"        # Let Codex decide when to ask before running commands.
approvals_reviewer = "user"           # Send approval prompts to you instead of the guardian reviewer subagent.
sandbox_mode = "workspace-write"      # Keep writes sandboxed to the workspace while still allowing normal editing.
allow_login_shell = true              # Allow shell tools to request login-shell behavior so your profile can load.

# review_model = "gpt-5.4"            # Optional dedicated model for `/review`; defaults to the active session model.
# model_provider = "openai"           # Provider id from `[model_providers]`; defaults to the built-in OpenAI provider.
# oss_provider = "ollama"             # Default local OSS provider for `--oss`: `ollama` or `lmstudio`.
# service_tier = "flex"               # Preferred service tier for new turns: `fast` or `flex`.
# model_context_window = 128000       # Manual context window override in tokens for the selected model.
# model_auto_compact_token_limit = 64000 # Trigger automatic history compaction at this token threshold.
# tool_output_token_limit = 12000     # Limit how many tokens of each tool output are retained in context.
# model_catalog_json = "/Users/djh/.codex/models.json" # Startup-only override for the model catalog file.
# background_terminal_max_timeout = 300000 # Maximum empty poll window for background terminal sessions in ms.
# log_dir = "/Users/djh/.codex/log"   # Override where Codex writes local log files.
# sqlite_home = "/Users/djh/.codex"   # Override where Codex stores its SQLite-backed runtime state.

# ---------------------------------------------------------------------------
# Reasoning and verbosity
# ---------------------------------------------------------------------------

# plan_mode_reasoning_effort = "high" # Use a different reasoning level while Plan mode is active.
# model_reasoning_summary = "auto"    # Request reasoning summaries: auto | concise | detailed | none.
# model_verbosity = "medium"          # GPT-5 text verbosity hint: low | medium | high.
# model_supports_reasoning_summaries = true # Force-enable reasoning summaries for compatible providers.

# ---------------------------------------------------------------------------
# Instruction overrides
# ---------------------------------------------------------------------------

# developer_instructions = ""         # Inject extra developer instructions before AGENTS.md on every turn.
# compact_prompt = ""                 # Inline override for the history compaction prompt text.
# commit_attribution = ""             # Override the auto-added git co-author trailer; empty string disables it.
# model_instructions_file = "/Users/djh/.codex/instructions.txt" # Replace Codex's built-in instruction file.
# experimental_compact_prompt_file = "/Users/djh/.codex/compact_prompt.txt" # Load the compaction prompt from a file.

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------

# notify = ["terminal-notifier", "-title", "Codex", "-message"] # Run an external notifier command with a JSON payload.

# ---------------------------------------------------------------------------
# Authentication and login
# ---------------------------------------------------------------------------

# cli_auth_credentials_store = "auto" # Where Codex stores login credentials: file | keyring | auto | ephemeral.
# chatgpt_base_url = "https://chatgpt.com/backend-api/" # Base URL for ChatGPT auth flow, not the OpenAI API.
# openai_base_url = "https://us.api.openai.com/v1" # Optional base URL override for the built-in OpenAI provider.
# forced_chatgpt_workspace_id = "00000000-0000-0000-0000-000000000000" # Restrict ChatGPT login to one workspace.
# forced_login_method = "chatgpt"    # Restrict login method: `chatgpt` or `api`.
# mcp_oauth_credentials_store = "auto" # Preferred store for MCP OAuth credentials: auto | file | keyring.
# mcp_oauth_callback_port = 4321      # Fixed local port for MCP OAuth callbacks.
# mcp_oauth_callback_url = "https://devbox.example.internal/callback" # Override redirect URI used during MCP OAuth.

# ---------------------------------------------------------------------------
# Project documentation controls
# ---------------------------------------------------------------------------

# project_doc_max_bytes = 32768       # Maximum number of bytes Codex reads from AGENTS.md files.
# project_doc_fallback_filenames = [] # Additional filenames to try when AGENTS.md is missing.
# project_root_markers = [".git"]     # Markers used when searching upward for a project root.

# ---------------------------------------------------------------------------
# History, file opener, UI, and misc root options
# ---------------------------------------------------------------------------

# file_opener = "cursor"              # URI scheme for clickable file citations: vscode | vscode-insiders | windsurf | cursor | none.
# hide_agent_reasoning = false        # Hide reasoning events from the TUI and `codex exec` output.
# show_raw_agent_reasoning = false    # Surface raw reasoning content when the model emits it.
# disable_paste_burst = false         # Disable burst-paste detection in the TUI.
# windows_wsl_setup_acknowledged = false # Track Windows onboarding acknowledgement state.
# check_for_update_on_startup = true  # Check for Codex updates when the CLI starts.
# web_search = "cached"               # Web search mode: disabled | cached | live.
# profile = "default"                 # Select a named profile from `[profiles]` at startup.
# suppress_unstable_features_warning = true # Hide warnings about under-development features.

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------

notify = ["/Users/djh/.codex/plugins/cache/openai-bundled/computer-use/1.0.758/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[tools]
# view_image = true                   # Enable the `view_image` tool explicitly.

# ---------------------------------------------------------------------------
# Agents
# ---------------------------------------------------------------------------

#[agents]
#max_threads = 6                     # Maximum number of concurrently open agent threads.
#max_depth = 1                       # Maximum nested agent depth; root sessions start at depth 0.
# job_max_runtime_seconds = 1800      # Default timeout for `spawn_agents_on_csv` worker jobs.

# [agents.reviewer]
# description = "Find correctness, security, and test risks in code." # Human-readable role description.
# config_file = "/Users/djh/.codex/agents/reviewer.toml" # Optional extra config layer for this agent role.
# nickname_candidates = ["Athena", "Ada"] # Optional display-name pool for spawned agents in this role.

# ---------------------------------------------------------------------------
# Skill overrides
# ---------------------------------------------------------------------------

# [[skills.config]]
# path = "/Users/djh/.codex/skills/example/SKILL.md" # Absolute path to the skill folder containing `SKILL.md`.
# enabled = false                    # Disable that specific skill without deleting it from disk.

# ---------------------------------------------------------------------------
# Sandbox behavior for `sandbox_mode = "workspace-write"`
# ---------------------------------------------------------------------------

[sandbox_workspace_write]
network_access = true               # Allow outbound network access inside the workspace-write sandbox.
# writable_roots = ["/Users/djh/.codex", "/tmp"] # Additional writable directories besides the current workspace.
# exclude_tmpdir_env_var = false    # Exclude `$TMPDIR` from the sandbox writable roots.
# exclude_slash_tmp = false         # Exclude `/tmp` from the sandbox writable roots.

# ---------------------------------------------------------------------------
# Shell environment policy
# ---------------------------------------------------------------------------

# [shell_environment_policy]
# inherit = "all"                   # Base environment inheritance for subprocesses: all | core | none.
# ignore_default_excludes = false   # Keep variables like *_TOKEN and *_SECRET instead of filtering them out.
# exclude = ["AWS_*"]               # Case-insensitive glob patterns to remove from the inherited environment.
# set = { FOO = "bar" }             # Environment variables to inject into every spawned subprocess.
# include_only = ["PATH", "HOME"]   # If set, keep only matching environment variables.
# experimental_use_profile = false  # Load your shell profile files before spawning subprocesses.

# ---------------------------------------------------------------------------
# Managed network proxy permissions
# ---------------------------------------------------------------------------

# [permissions.network]
# enabled = true                    # Turn on Codex-managed network proxying rules.
# proxy_url = "http://127.0.0.1:43128" # HTTP proxy URL used by managed outbound traffic.
# admin_url = "http://127.0.0.1:43129" # Admin/control endpoint for the managed proxy.
# enable_socks5 = false             # Also expose a SOCKS5 proxy endpoint.
# socks_url = "http://127.0.0.1:43130" # SOCKS5 proxy URL when SOCKS support is enabled.
# enable_socks5_udp = false         # Allow UDP over the managed SOCKS5 proxy.
# allow_upstream_proxy = false      # Allow the managed proxy to forward through another upstream proxy.
# dangerously_allow_non_loopback_proxy = false # Permit binding the proxy to non-loopback addresses.
# dangerously_allow_non_loopback_admin = false # Permit binding the admin endpoint to non-loopback addresses.
# dangerously_allow_all_unix_sockets = false # Allow unrestricted Unix socket access through the proxy layer.
# mode = "limited"                  # Proxy rule mode: `limited` or `full`.
# allowed_domains = ["api.openai.com"] # Domains explicitly allowed through the proxy.
# denied_domains = ["example.com"]  # Domains explicitly denied through the proxy.
# allow_unix_sockets = ["/var/run/docker.sock"] # Unix sockets allowed through the proxy layer.
# allow_local_binding = false       # Allow tools to bind local listening sockets.

# ---------------------------------------------------------------------------
# History persistence
# ---------------------------------------------------------------------------

# [history]
# persistence = "save-all"          # History persistence mode: save-all | none.
# max_bytes = 5242880               # Trim oldest history entries once the file exceeds this many bytes.

# ---------------------------------------------------------------------------
# TUI notifications and appearance
# ---------------------------------------------------------------------------

[tui]
notifications = true               # Enable TUI notifications, or set a filtered list of event ids instead of `true`.
notification_method = "auto"       # Terminal notification method: auto | osc9 | bel.
animations = true                 # Enable welcome, spinner, and status animations in the TUI.

[tui.model_availability_nux]
"gpt-5.5" = 4
# show_tooltips = true              # Show onboarding tooltips on the welcome screen.
# alternate_screen = "auto"         # Alternate screen mode: auto | always | never.
# status_line = ["model-with-reasoning", "context-remaining", "current-dir"] # Footer items shown in the status line.
# theme = "catppuccin-mocha"        # Syntax-highlighting theme name for the TUI.

# [tui.model_availability_nux]
# "gpt-5.4" = 1                     # Internal tooltip state keyed by model slug; usually managed by Codex.

# ---------------------------------------------------------------------------
# Analytics, feedback, and notices
# ---------------------------------------------------------------------------

# [analytics]
# enabled = true                    # Enable analytics for this machine/profile.

# [feedback]
# enabled = true                    # Allow `/feedback` submissions.

[notice]
hide_gpt5_1_migration_prompt = true           # Record that the GPT-5.1 migration prompt was acknowledged.
hide_gpt-5.1-codex-max_migration_prompt = true # Record that the GPT-5.1 Codex Max migration prompt was acknowledged.
hide_full_access_warning = true               # Record that the full-access warning was acknowledged.
# hide_rate_limit_model_nudge = true          # Hide the suggestion to switch models when hitting limits.
# hide_world_writable_warning = true          # Windows-only acknowledgement for world-writable directory warnings.

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"         # Remember that this model migration prompt was already acknowledged.
"gpt-5.1-codex" = "gpt-5.2-codex"             # Remember that this model migration prompt was already acknowledged.
"gpt-5.2-codex" = "gpt-5.3-codex"             # Remember that this model migration prompt was already acknowledged.

# ---------------------------------------------------------------------------
# Feature flags
# Runtime-accepted flags are listed here; removed/deprecated flags are omitted.
# ---------------------------------------------------------------------------

[features]
unified_exec = true                 # Use the PTY-backed unified exec implementation.
shell_snapshot = true               # Cache shell environment snapshots to speed up repeated commands.
multi_agent = true                  # Enable multi-agent collaboration tools.
apps = true                         # Enable apps/connectors support.
plugins = true                      # Enable the local plugin system.
js_repl = true                      # Enable the JavaScript REPL.
prevent_idle_sleep = true           # Prevent the machine from sleeping while a turn is active.

# shell_tool = true                 # Enable the standard shell tool.
# personality = true                # Enable model personality controls.
# fast_mode = true                  # Enable Fast mode selection and the `service_tier = "fast"` path.
enable_request_compression = true # Compress streaming request bodies when supported.
# skill_mcp_dependency_install = true # Allow prompting to install missing skill MCP dependencies.
# guardian_approval = true          # Route eligible approvals through the guardian reviewer flow.
# apply_patch_freeform = true       # Opt into the newer freeform `apply_patch` tool behavior.
# undo = true                       # Enable undo support in Codex.
tool_suggest = true               # Enable discoverable tool suggestions.
# tool_call_mcp_elicitation = true  # Allow MCP elicitation support for tool calls.
enable_fanout = true              # Enable experimental fanout support for certain workflows.
multi_agent_v2 = true             # Enable the newer multi-agent implementation.
tool_search = true                # Enable experimental tool search/discovery.
# runtime_metrics = true            # Enable internal runtime metrics collection.
memories = true                   # Enable the memories subsystem.
# js_repl_tools_only = true         # Restrict JS REPL access to tool-backed use cases.
# code_mode = true                  # Enable experimental code mode support.
# code_mode_only = true             # Restrict sessions to code mode when enabled.

# ---------------------------------------------------------------------------
# MCP servers
# ---------------------------------------------------------------------------

# [mcp_servers.docs]
# enabled = true                    # Disable this server without removing its definition.
# required = true                   # Fail startup/resume if this server cannot initialize.
# command = "docs-server"           # Launcher command for a stdio MCP server.
# args = ["--port", "4000"]         # Arguments passed to the stdio server command.
# env = { API_KEY = "value" }       # Static environment variables forwarded to the server process.
# env_vars = ["ANOTHER_SECRET"]     # Names of parent environment variables to forward through.
# cwd = "/path/to/server"           # Working directory for the MCP server process.
# startup_timeout_sec = 10.0        # Time to wait for server startup before failing.
# startup_timeout_ms = 10000        # Millisecond alias for startup timeout.
# tool_timeout_sec = 60.0           # Per-tool timeout for calls sent to this server.
# enabled_tools = ["search"]        # Allow-list of tools exposed from this server.
# disabled_tools = ["slow-tool"]    # Deny-list of tools exposed from this server.
# scopes = ["read:docs"]            # OAuth scopes requested for this server when needed.
# oauth_resource = "https://docs.example.com/" # OAuth resource/audience for this server.

# [mcp_servers.github-http]
# enabled = true                    # Leave the server enabled.
# required = true                   # Require the server to initialize successfully.
# url = "https://github-mcp.example.com/mcp" # Streamable HTTP MCP endpoint.
# bearer_token_env_var = "GITHUB_TOKEN" # Environment variable supplying the bearer token.
# http_headers = { "X-Example" = "value" } # Static headers to send with each MCP HTTP request.
# env_http_headers = { "X-Auth" = "AUTH_ENV" } # Header values sourced from environment variables.
# startup_timeout_sec = 10.0        # Startup grace period for HTTP transport initialization.
# tool_timeout_sec = 60.0           # Per-tool timeout for HTTP MCP calls.
# enabled_tools = ["list_issues"]   # Allow-list of tools exposed from this HTTP server.
# disabled_tools = ["delete_issue"] # Deny-list of tools exposed from this HTTP server.
# scopes = ["repo"]                 # OAuth scopes requested for this HTTP server.

codex_hooks = true
[mcp_servers.fetch]
command = "uvx"                     # Launch the Fetch MCP server with `uvx`.
args = ["mcp-server-fetch"]         # Package entrypoint passed to `uvx`.
enabled = false                   # Disable Fetch without deleting its config.
# required = false                  # Start even if Fetch fails to initialize.
# env = { UV_CACHE_DIR = "/tmp/uv" } # Extra environment variables forwarded to Fetch.
# env_vars = ["OPENAI_API_KEY"]     # Parent environment variables to pass through to Fetch.
# startup_timeout_sec = 10.0        # Startup grace period for the Fetch server.
# tool_timeout_sec = 60.0           # Per-tool timeout for calls into Fetch.

[mcp_servers.serena]
command = "uvx"                     # Launch Serena via `uvx`.
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex"] # Fetch and start Serena from Git.
enabled = false                     # Keep Serena available in config but disabled by default.
# required = false                  # Do not fail startup if Serena is unavailable.

[mcp_servers.lsp]
command = "docker"                  # Launch the LSP MCP server via Docker.
args = ["run", "-i", "--rm", "docker.io/jonrad/lsp-mcp:0.3.1"] # Start the published LSP MCP image.
enabled = false                     # Keep the LSP server installed but disabled by default.
# required = false                  # Do not fail startup if the LSP server is unavailable.

[mcp_servers.chrome-devtools]
command = "npx"                     # Launch the Chrome DevTools MCP server via `npx`.
args = ["chrome-devtools-mcp@latest"] # Install or reuse the latest Chrome DevTools MCP package.
enabled = false                     # Keep browser automation opt-in.
# required = false                  # Do not fail startup if Chrome DevTools MCP is unavailable.

[mcp_servers.chrome-devtools.tools.new_page]
approval_mode = "approve"           # Always approve opening a new browser page via this MCP tool.

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"           # Always approve snapshot capture via this MCP tool.

[mcp_servers.chrome-devtools.tools.evaluate_script]
approval_mode = "approve"           # Always approve page-side script evaluation via this MCP tool.

[mcp_servers.chrome-devtools.tools.get_network_request]
approval_mode = "approve"           # Always approve captured request inspection via this MCP tool.

[mcp_servers.chrome-devtools.tools.navigate_page]
approval_mode = "approve"           # Always approve page navigation via this MCP tool.

[mcp_servers.chrome-devtools.tools.take_screenshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.click]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.fill]
approval_mode = "approve"

